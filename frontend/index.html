<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f11;
      --surface:   #161a1e;
      --border:    #262c33;
      --accent:    #00e5a0;
      --accent2:   #0090ff;
      --danger:    #ff4d6a;
      --warn:      #ffb830;
      --text:      #e8edf2;
      --muted:     #6b7784;
      --radius:    10px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
    }

    /* ── Layout ───────────────────────────────────── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      font-family: var(--font-head);
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    #user-info {
      display: flex; align-items: center; gap: 12px;
      font-size: 13px; color: var(--muted);
    }
    #user-info strong { color: var(--text); }

    /* ── Pages ───────────────────────────────────── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Auth ───────────────────────────────────── */
    #auth-page {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 61px);
      padding: 32px 16px;
    }
    #auth-page.active { display: flex; }

    .auth-box {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .auth-tabs {
      display: flex; gap: 4px;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1; padding: 8px;
      background: none; border: none;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: #000;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; margin-bottom: 6px;
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input, .form-group textarea {
      width: 100%; padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      transition: border-color 0.15s;
      outline: none;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* ── Buttons ────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px;
      border: none; border-radius: 7px;
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary   { background: var(--accent); color: #000; }
    .btn-primary:hover   { filter: brightness(1.1); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #333b45; }
    .btn-danger    { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
    .btn-danger:hover    { background: var(--danger); color: #fff; }
    .btn-ghost     { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover     { color: var(--text); border-color: var(--text); }
    .btn-full      { width: 100%; }
    .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

    /* ── Alerts ─────────────────────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-error   { background: #2a1219; border: 1px solid var(--danger); color: var(--danger); }
    .alert-success { background: #0d2218; border: 1px solid var(--accent); color: var(--accent); }

    /* ── Tasks Page ─────────────────────────────── */
    #tasks-page { padding: 32px; max-width: 820px; margin: 0 auto; width: 100%; }
    #tasks-page.active { display: block; }

    .tasks-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }

    .tasks-header h1 {
      font-family: var(--font-head);
      font-size: 26px; font-weight: 700;
    }

    /* ── Filter bar ─────────────────────────────── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      font-family: var(--font-mono);
      font-size: 12px; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
    }
    .filter-btn.active { border-color: var(--accent); color: var(--accent); background: #0d2218; }

    /* ── New Task Form ──────────────────────────── */
    .new-task-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }
    .new-task-box h2 {
      font-family: var(--font-head);
      font-size: 15px; font-weight: 600;
      margin-bottom: 16px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .new-task-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .new-task-row input {
      flex: 1; min-width: 180px;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .new-task-row input:focus { border-color: var(--accent); }

    /* ── Task List ──────────────────────────────── */
    #task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .task-card.done { opacity: 0.55; }
    .task-card:hover { border-color: #333b45; }

    .task-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none; cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .task-check.checked::after {
      content: "✓"; font-size: 11px; color: #000; font-weight: 700;
    }

    .task-body { flex: 1; min-width: 0; }
    .task-title {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-card.done .task-title { text-decoration: line-through; color: var(--muted); }
    .task-desc {
      font-size: 12px; color: var(--muted); margin-top: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .task-meta {
      display: flex; align-items: center; gap: 10px;
      margin-top: 8px; font-size: 11px; color: var(--muted);
    }
    .badge {
      padding: 2px 8px; border-radius: 12px;
      font-size: 11px;
    }
    .badge-done    { background: #0d2218; color: var(--accent); border: 1px solid var(--accent); }
    .badge-pending { background: #201a0d; color: var(--warn); border: 1px solid var(--warn); }

    .task-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* ── Pagination ─────────────────────────────── */
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 24px;
    }
    .page-btn {
      padding: 6px 14px;
      border-radius: 7px; border: 1px solid var(--border);
      background: none; color: var(--muted);
      font-family: var(--font-mono); font-size: 13px;
      cursor: pointer; transition: all 0.15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 12px; color: var(--muted); }

    /* ── Empty state ────────────────────────────── */
    .empty {
      text-align: center; padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Stats bar ──────────────────────────────── */
    .stats-bar {
      display: flex; gap: 16px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      min-width: 110px;
    }
    .stat-val {
      font-family: var(--font-head);
      font-size: 22px; font-weight: 700;
      color: var(--accent);
    }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── Loading spinner ────────────────────────── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 600px) {
      #tasks-page { padding: 16px; }
      header { padding: 12px 16px; }
      .tasks-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">Task<span>Flow</span></div>
    <div id="user-info" style="display:none">
      <span>logged in as <strong id="username-display"></strong></span>
      <button class="btn btn-ghost" onclick="logout()" style="padding:6px 12px;font-size:12px">logout</button>
    </div>
  </header>

  <!-- ── Auth Page ──────────────────────────────── -->
  <div id="auth-page" class="page active">
    <div class="auth-box">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="auth-alert"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="your_username" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="choose_username" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="min 6 characters" required minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="register-btn">Create Account</button>
      </form>
    </div>
  </div>

  <!-- ── Tasks Page ─────────────────────────────── -->
  <div id="tasks-page" class="page">
    <div class="tasks-header">
      <h1>My Tasks</h1>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-done" style="color:var(--accent)">0</div>
        <div class="stat-lbl">Completed</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-pending" style="color:var(--warn)">0</div>
        <div class="stat-lbl">Pending</div>
      </div>
    </div>

    <!-- New Task -->
    <div class="new-task-box">
      <h2>+ New Task</h2>
      <div id="task-alert"></div>
      <div class="new-task-row">
        <input type="text" id="new-title" placeholder="Task title..." />
        <input type="text" id="new-desc"  placeholder="Description (optional)" />
        <button class="btn btn-primary" onclick="handleCreateTask()">Add</button>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all"       onclick="setFilter('all',this)">All</button>
      <button class="filter-btn"        data-filter="pending"   onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn"        data-filter="completed" onclick="setFilter('completed',this)">Completed</button>
    </div>

    <!-- Task List -->
    <div id="task-list"></div>

    <!-- Pagination -->
    <div class="pagination">
      <button class="page-btn" id="prev-btn" onclick="changePage(-1)" disabled>← Prev</button>
      <span class="page-info" id="page-info">Page 1</span>
      <button class="page-btn" id="next-btn" onclick="changePage(1)">Next →</button>
    </div>
  </div>

</div>

<script>
  // ── Config ────────────────────────────────────────
  // Auto-detect API base: same origin (for Render/deployed), or localhost:8000 for local dev
  const API = window.location.port === '5500' || window.location.hostname === 'localhost' && window.location.port !== '8000'
    ? 'http://localhost:8000'
    : '';

  // ── State ─────────────────────────────────────────
  let token       = localStorage.getItem('token') || null;
  let username    = localStorage.getItem('username') || null;
  let currentPage = 1;
  let totalPages  = 1;
  let filterMode  = 'all';   // 'all' | 'pending' | 'completed'
  const PAGE_SIZE = 8;

  // ── Init ──────────────────────────────────────────
  if (token) showTasksPage();
  else showAuthPage();

  // ── Routing ───────────────────────────────────────
  function showAuthPage() {
    document.getElementById('auth-page').classList.add('active');
    document.getElementById('tasks-page').classList.remove('active');
    document.getElementById('user-info').style.display = 'none';
  }

  function showTasksPage() {
    document.getElementById('auth-page').classList.remove('active');
    document.getElementById('tasks-page').classList.add('active');
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('username-display').textContent = username;
    loadTasks();
  }

  // ── Auth Tab ──────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    clearAlert('auth-alert');
  }

  // ── Register ──────────────────────────────────────
  async function handleRegister(e) {
    e.preventDefault();
    const btn = document.getElementById('register-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    clearAlert('auth-alert');

    const body = {
      username: document.getElementById('reg-username').value.trim(),
      email:    document.getElementById('reg-email').value.trim(),
      password: document.getElementById('reg-password').value,
    };

    try {
      const res = await api('POST', '/register', body);
      showAlert('auth-alert', 'success', `Account created! Please log in, ${res.username}.`);
      switchTab('login');
      document.querySelectorAll('.auth-tab')[0].classList.add('active');
      document.querySelectorAll('.auth-tab')[1].classList.remove('active');
    } catch (err) {
      showAlert('auth-alert', 'error', err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  // ── Login ─────────────────────────────────────────
  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    clearAlert('auth-alert');

    const body = {
      username: document.getElementById('login-username').value.trim(),
      password: document.getElementById('login-password').value,
    };

    try {
      const res = await api('POST', '/login', body);
      token    = res.access_token;
      username = body.username;
      localStorage.setItem('token',    token);
      localStorage.setItem('username', username);
      showTasksPage();
    } catch (err) {
      showAlert('auth-alert', 'error', err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  // ── Logout ────────────────────────────────────────
  function logout() {
    token = null; username = null;
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    showAuthPage();
  }

  // ── Load Tasks ────────────────────────────────────
  async function loadTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';

    let url = `/tasks?page=${currentPage}&page_size=${PAGE_SIZE}`;
    if (filterMode === 'completed') url += '&completed=true';
    if (filterMode === 'pending')   url += '&completed=false';

    try {
      const data = await api('GET', url);
      renderTasks(data);
      updateStats();
    } catch (err) {
      list.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
    }
  }

  function renderTasks(data) {
    const list = document.getElementById('task-list');
    totalPages = Math.ceil(data.total / PAGE_SIZE) || 1;

    document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
    document.getElementById('prev-btn').disabled = currentPage <= 1;
    document.getElementById('next-btn').disabled = currentPage >= totalPages;

    if (!data.tasks.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <p>${filterMode === 'all' ? 'No tasks yet. Add one above!' : `No ${filterMode} tasks.`}</p>
        </div>`;
      return;
    }

    list.innerHTML = data.tasks.map(t => `
      <div class="task-card ${t.completed ? 'done' : ''}" id="card-${t.id}">
        <button class="task-check ${t.completed ? 'checked' : ''}"
                onclick="toggleComplete(${t.id}, ${t.completed})" title="${t.completed ? 'Mark pending' : 'Mark done'}">
        </button>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
          <div class="task-meta">
            <span class="badge ${t.completed ? 'badge-done' : 'badge-pending'}">
              ${t.completed ? 'done' : 'pending'}
            </span>
            <span>${formatDate(t.created_at)}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-danger" onclick="deleteTask(${t.id})" style="padding:6px 10px;font-size:12px">✕</button>
        </div>
      </div>
    `).join('');
  }

  async function updateStats() {
    try {
      const all  = await api('GET', '/tasks?page=1&page_size=1');
      const done = await api('GET', '/tasks?page=1&page_size=1&completed=true');
      document.getElementById('stat-total').textContent   = all.total;
      document.getElementById('stat-done').textContent    = done.total;
      document.getElementById('stat-pending').textContent = all.total - done.total;
    } catch {}
  }

  // ── Create Task ───────────────────────────────────
  async function handleCreateTask() {
    const titleEl = document.getElementById('new-title');
    const descEl  = document.getElementById('new-desc');
    const title   = titleEl.value.trim();
    if (!title) { showAlert('task-alert', 'error', 'Title is required.'); return; }

    try {
      await api('POST', '/tasks', { title, description: descEl.value.trim() || null });
      titleEl.value = '';
      descEl.value  = '';
      clearAlert('task-alert');
      currentPage = 1;
      await loadTasks();
    } catch (err) {
      showAlert('task-alert', 'error', err.message);
    }
  }

  // Enter key on new task inputs
  ['new-title','new-desc'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') handleCreateTask();
    });
  });

  // ── Toggle Complete ───────────────────────────────
  async function toggleComplete(id, currentlyDone) {
    try {
      await api('PUT', `/tasks/${id}`, { completed: !currentlyDone });
      await loadTasks();
    } catch (err) {
      alert(err.message);
    }
  }

  // ── Delete Task ───────────────────────────────────
  async function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    try {
      await api('DELETE', `/tasks/${id}`);
      await loadTasks();
    } catch (err) {
      alert(err.message);
    }
  }

  // ── Filter ────────────────────────────────────────
  function setFilter(mode, btn) {
    filterMode = mode;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTasks();
  }

  // ── Pagination ────────────────────────────────────
  function changePage(delta) {
    const next = currentPage + delta;
    if (next < 1 || next > totalPages) return;
    currentPage = next;
    loadTasks();
  }

  // ── API Helper ────────────────────────────────────
  async function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch(API + path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
    });

    if (res.status === 401) { logout(); throw new Error('Session expired. Please log in again.'); }
    if (res.status === 204) return null;

    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
    return data;
  }

  // ── Utilities ─────────────────────────────────────
  function showAlert(id, type, msg) {
    document.getElementById(id).innerHTML =
      `<div class="alert alert-${type}">${msg}</div>`;
  }
  function clearAlert(id) {
    document.getElementById(id).innerHTML = '';
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }
</script>
</body>
</html>
